{% extends "base_auth.html" %}
{% block title %}Create account{% endblock %}

{% block content %}
<div class="co-auth-logo">
  <i class="bi bi-building-fill fs-3"></i>
  <span>CampusOps</span>
</div>

<h2 class="co-auth-title">Create account</h2>
<p class="co-auth-subtitle">Join your campus platform</p>

<div id="form-error" class="alert alert-danger d-none py-2" role="alert" style="font-size:.855rem;"></div>

<form id="signup-form" novalidate>
  {% csrf_token %}

  <div class="row g-2 mb-2">
    <div class="col">
      <label class="form-label" for="id_first_name">First name</label>
      <input type="text" id="id_first_name" name="first_name" class="form-control"
             placeholder="John" autocomplete="given-name">
    </div>
    <div class="col">
      <label class="form-label" for="id_last_name">Last name</label>
      <input type="text" id="id_last_name" name="last_name" class="form-control"
             placeholder="Doe" autocomplete="family-name">
    </div>
  </div>

  <div class="mb-2">
    <label class="form-label" for="id_email">Email address <span class="text-danger">*</span></label>
    <div class="input-group">
      <span class="input-group-text"><i class="bi bi-envelope"></i></span>
      <input type="email" id="id_email" name="email" class="form-control"
             placeholder="you@campus.edu" autocomplete="email" required>
    </div>
  </div>

  <div class="mb-2">
    <label class="form-label" for="id_campus_id">Campus ID</label>
    <input type="text" id="id_campus_id" name="campus_id" class="form-control"
           placeholder="e.g. CS-2024-001">
  </div>

  <div class="mb-2">
    <label class="form-label" for="id_role">Role <span class="text-danger">*</span></label>
    <select id="id_role" name="role" class="form-select" required>
      <option value="" disabled selected>Select your role…</option>
      <option value="student">Student</option>
      <option value="faculty">Faculty</option>
      <option value="staff">Staff</option>
    </select>
  </div>

  <div class="mb-2">
    <label class="form-label" for="id_password">Password <span class="text-danger">*</span></label>
    <div class="input-group">
      <span class="input-group-text"><i class="bi bi-lock"></i></span>
      <input type="password" id="id_password" name="password" class="form-control"
             placeholder="Minimum 8 characters" autocomplete="new-password" required>
      <button class="btn btn-outline-secondary" type="button" id="toggle-password" tabindex="-1">
        <i class="bi bi-eye"></i>
      </button>
    </div>
  </div>

  <div class="mb-4">
    <label class="form-label" for="id_password_confirm">Confirm password <span class="text-danger">*</span></label>
    <div class="input-group">
      <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
      <input type="password" id="id_password_confirm" name="password_confirm" class="form-control"
             placeholder="Repeat password" autocomplete="new-password" required>
    </div>
  </div>

  <button type="submit" class="btn btn-primary w-100" id="signup-submit">
    Create account
  </button>
</form>

<p class="co-auth-footer mt-3">
  Already have an account?
  <a href="{% url 'web-login' %}">Sign in</a>
</p>
{% endblock %}

{% block extra_js %}
<script>
  CampusOpsAuth.initSignupPage({
    formId:       'signup-form',
    errorId:      'form-error',
    submitId:     'signup-submit',
    registerUrl:  '/api/v1/auth/register/',
    tokenUrl:     '{% url "auth-token" %}',
    dashboardUrl: '{% url "web-dashboard" %}',
    loginUrl:     '{% url "web-login" %}',
  });
</script>
{% endblock %}
