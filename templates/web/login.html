{% extends "base.html" %}
{% block title %}Sign in — CampusOps{% endblock %}
{% block content %}
<section class="card">
  <h1>Sign in</h1>
  <p class="muted">Use the email and password you registered with.</p>
  <div id="form-error" class="alert alert-error hidden" role="alert"></div>
  <form id="login-form" class="stack" novalidate>
    {% csrf_token %}
    <label class="field">
      <span>Email</span>
      <input type="email" name="email" autocomplete="username" required>
    </label>
    <label class="field">
      <span>Password</span>
      <input type="password" name="password" autocomplete="current-password" required>
    </label>
    <button type="submit" class="btn primary" id="login-submit">Continue</button>
  </form>
  <p class="muted footnote">No account? <a href="{% url 'web-signup' %}">Create one</a></p>
</section>
{% endblock %}
{% block extra_js %}
<script>
  document.addEventListener('DOMContentLoaded', function () {
    CampusOpsAuth.initLoginPage({
      formId: 'login-form',
      errorId: 'form-error',
      submitId: 'login-submit',
      tokenUrl: '/api/v1/auth/token/',
      dashboardUrl: '{% url "web-dashboard" %}',
    });
  });
</script>
{% endblock %}
